# Ubert (Uber clone) -- book-a-ride flow.
name: ubert-book-ride
platform: ios

app:
  app_id: "3ccf53c0-314a-498a-b9c8-0b7bd173c57f"

frame:
  style: iphone-pro
  color: black
  background: light        # Uber's UI is light, black device reads crisp on it
  shadow: true
  width: 440

output:
  gif: true
  mp4: true
  fps: 30
  hold: 1.4
  xfade: 0.45
  loop: true

capture:
  initial: true            # home screen
  settle: 0.9              # let push/search animations settle before the shot

steps:
  - tap: { target: "the 'Where to?' search bar at the top" }
    label: "open-search"
    hold: 1.2
  - type: { target: "the destination search text field", text: "Times Square" }
    label: "type-destination"
    hold: 1.3
  - tap: { target: "the first 'Times Square' result in the list" }
    label: "select-destination"
    hold: 1.7
  - tap: { target: "the first ride option / 'Choose UberX' row" }
    label: "choose-ride"
    hold: 1.9
